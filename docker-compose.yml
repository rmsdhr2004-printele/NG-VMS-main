services:
  backend:
    image: ngvms-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ngvms_backend
    ports:
      - "5001:5001"
      - "9464:9464"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/ngvms?replicaSet=rs0}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-YOUR_SUPER_SECRET_PRODUCTION_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - SMTP_HOST=${SMTP_HOST:-smtp_relay}
      - SMTP_PORT=${SMTP_PORT:-1025}
    depends_on:
      - redis
      - mongo
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - ngvms_network

  frontend:
    image: ngvms-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-/}
    container_name: ngvms_frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - ngvms_network

  redis:
    image: redis:7-alpine
    container_name: ngvms_redis
    restart: unless-stopped
    networks:
      - ngvms_network
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:6
    container_name: ngvms_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-NGVmsEnterpriseDB2026!}
    command: >
      bash -c "
      cp /data/mongo/mongo.key /tmp/mongo.key &&
      chmod 400 /tmp/mongo.key &&
      chown 999:999 /tmp/mongo.key &&
      exec mongod --replSet rs0 --bind_ip_all --quiet --auth --keyFile /tmp/mongo.key
      "
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    networks:
      - ngvms_network
    volumes:
      - mongo_data:/data/db
      - ./data/mongo/mongo.key:/data/mongo/mongo.key:ro
  mongo_setup:
    image: mongo:6
    container_name: ngvms_mongo_setup
    depends_on:
      - mongo
    restart: "no"
    networks:
      - ngvms_network
    command: >
      bash -c "
      echo 'Waiting for MongoDB to start...';
      sleep 10;
      mongosh --host mongo:27017 -u \"$${MONGO_ROOT_USER:-admin}\" -p \"$${MONGO_ROOT_PASSWORD:-NGVmsEnterpriseDB2026!}\" --authenticationDatabase admin --quiet --eval \"try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }\"
      "

  minio:
    image: minio/minio
    container_name: ngvms_minio
    ports:
      - "9005:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-ngvmsadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-EnterpriseMinioPass2026!}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - ngvms_network
    volumes:
      - minio_data:/data

  smtp_relay:
    image: maildev/maildev
    container_name: ngvms_smtp
    ports:
      - "1081:1080" # Web UI
    restart: unless-stopped
    networks:
      - ngvms_network

  proxy:
    image: caddy:2-alpine
    container_name: ngvms_proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - TLS_EMAIL=${TLS_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - ngvms_network

  prometheus:
    image: prom/prometheus:latest
    container_name: ngvms_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - ngvms_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ngvms_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - ngvms_network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ngvms_alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - ngvms_network

networks:
  ngvms_network:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  alertmanager_data:
