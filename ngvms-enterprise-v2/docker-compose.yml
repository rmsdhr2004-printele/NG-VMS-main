version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ngvms_backend
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/ngvms?replicaSet=rs0}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-YOUR_SUPER_SECRET_PRODUCTION_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - SMTP_HOST=${SMTP_HOST:-smtp_relay}
      - SMTP_PORT=${SMTP_PORT:-1025}
    depends_on:
      - redis
      - mongo
      - minio
    restart: unless-stopped
    networks:
      - ngvms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-/}
    container_name: ngvms_frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ngvms_network

  redis:
    image: redis:7-alpine
    container_name: ngvms_redis
    restart: unless-stopped
    networks:
      - ngvms_network
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:6
    container_name: ngvms_mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    networks:
      - ngvms_network
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio
    container_name: ngvms_minio
    ports:
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - ngvms_network
    volumes:
      - minio_data:/data

  smtp_relay:
    image: maildev/maildev
    container_name: ngvms_smtp
    ports:
      - "1080:1080" # Web UI
    restart: unless-stopped
    networks:
      - ngvms_network

  proxy:
    image: caddy:2-alpine
    container_name: ngvms_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - ngvms_network

  prometheus:
    image: prom/prometheus:latest
    container_name: ngvms_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - ngvms_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ngvms_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - ngvms_network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ngvms_alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - ngvms_network

networks:
  ngvms_network:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  alertmanager_data:
